  @media (max-width: 640px) {
    .hero { text-align: center; min-height: 320px; }
    .hero-photo { width: 100%; opacity: 0.18; mask-image: none; -webkit-mask-image: none; }
    .hero-content { width: 100%; }
  }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; display: block; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(48px, 10vw, 100px); font-weight: 900; line-height: .95; letter-spacing: -.02em; color: var(--cream); }
  .hero h1 span { color: var(--gold); font-style: italic; }
  .hero-sub { margin-top: 20px; font-size: 15px; color: var(--muted); letter-spacing: .04em; max-width: 420px; }
  .gold-line { width: 60px; height: 2px; background: var(--gold); margin: 28px 0 0; }

  /* LOADING */
  .loading-bar { text-align: center; padding: 80px 24px; color: var(--muted); }
  .loading-bar .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { text-align: center; padding: 60px 24px; color: var(--muted); }
  .error-box p { margin-bottom: 8px; }
  .error-box code { font-size: 11px; background: var(--card); padding: 4px 10px; border-radius: 4px; color: var(--gold); display: inline-block; margin-top: 8px; }

  /* CONTROLS */
  .controls-bar { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 24px 36px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; padding: 8px 18px; border-radius: 999px; cursor: pointer; transition: all .2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); }
  .separator { width: 1px; height: 28px; background: var(--border); }
  .view-toggle { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-btn { background: transparent; border: none; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; }
  .view-btn svg { width: 14px; height: 14px; }
  .view-btn:hover { color: var(--gold); }
  .view-btn.active { background: var(--gold); color: var(--dark); }

  /* SECTION */
  .events-section { padding: 0 24px 80px; }
  .section-header { max-width: 960px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .events-label { font-size: 11px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); }

  /* LIST */
  .events-grid { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 2px; }
  .event-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; display: grid; grid-template-columns: 90px 1fr auto; align-items: center; cursor: pointer; overflow: hidden; position: relative; transition: background .2s, border-color .2s, transform .15s; }
  .event-card:hover { background: var(--card2); border-color: var(--gold); transform: translateX(4px); }
  .event-card.past { opacity: .45; }
  .event-card.past:hover { opacity: .6; }
  .event-card::before, .event-card::after { content: ''; position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: var(--dark); border: 1px solid var(--border); transform: translateY(-50%); transition: border-color .2s; }
  .event-card::before { left: 82px; }
  .event-card::after  { right: 130px; }
  .event-card:hover::before, .event-card:hover::after { border-color: var(--gold); }
  .card-date { background: var(--gold); color: var(--dark); text-align: center; padding: 22px 14px; align-self: stretch; display: flex; flex-direction: column; justify-content: center; min-width: 90px; }
  .card-date .day { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; line-height: 1; }
  .card-date .month { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
  .card-date .weekday { font-size: 10px; font-weight: 400; margin-top: 4px; opacity: .7; }
  .card-info { padding: 18px 24px 18px 28px; }
  .card-city { font-size: 11px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .card-venue { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--cream); line-height: 1.2; }
  .card-meta { margin-top: 8px; font-size: 13px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .card-action { padding: 18px 24px 18px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 126px; }
  .badge-status { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  .badge-status.aberto   { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
  .badge-status.esgotado { background: rgba(192,57,43,.15); color: #e74c3c; border: 1px solid rgba(192,57,43,.3); }
  .badge-status.passado  { background: rgba(136,136,136,.1); color: var(--muted); border: 1px solid var(--border); }
  .btn-camarim { background: var(--gold); color: var(--dark); border: none; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 8px 14px; border-radius: 3px; cursor: pointer; transition: background .2s; white-space: nowrap; }
  .btn-camarim:hover { background: var(--gold-lt); }
  .btn-camarim:disabled { opacity: .4; cursor: default; }

  /* CALENDAR */
  .calendar-wrap { max-width: 960px; margin: 0 auto; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cal-nav button { background: var(--card); border: 1px solid var(--border); color: var(--cream); font-size: 18px; width: 38px; height: 38px; border-radius: 4px; cursor: pointer; transition: border-color .2s, color .2s; }
  .cal-nav button:hover { border-color: var(--gold); color: var(--gold); }
  .cal-month-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--cream); }
  .cal-month-title span { color: var(--gold); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: 10px 0; }
  .cal-cell { background: var(--card); border: 1px solid var(--border); border-radius: 4px; min-height: 88px; padding: 8px; position: relative; }
  .cal-cell.other-month { opacity: .25; }
  .cal-cell.today { border-color: rgba(201,168,76,.5); }
  .cal-cell-num { font-size: 13px; font-weight: 600; color: var(--muted); line-height: 1; margin-bottom: 6px; }
  .cal-cell.today .cal-cell-num { color: var(--gold); }
  .cal-event { font-size: 10px; font-weight: 700; border-radius: 3px; padding: 3px 6px; margin-bottom: 3px; cursor: pointer; line-height: 1.3; transition: background .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-event.aberto   { background: var(--gold); color: var(--dark); }
  .cal-event.aberto:hover { background: var(--gold-lt); }
  .cal-event.esgotado { background: rgba(192,57,43,.7); color: #fff; }
  .cal-event.passado  { background: #333; color: var(--muted); }

  .empty { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 15px; }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform .25s; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-header { background: var(--gold); padding: 24px 28px; position: relative; }
  .modal-header .m-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: rgba(13,13,13,.6); margin-bottom: 6px; }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--dark); line-height: 1.1; }
  .modal-header .m-date { font-size: 13px; color: rgba(13,13,13,.65); margin-top: 6px; font-weight: 500; }
  .modal-close { position: absolute; top: 16px; right: 20px; background: rgba(0,0,0,.15); border: none; color: var(--dark); font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
  .modal-close:hover { background: rgba(0,0,0,.3); }
  .modal-body { padding: 28px; }
  .modal-details { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .detail-item label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .detail-item p { font-size: 14px; color: var(--cream); }
  .modal-desc { font-size: 14px; color: var(--muted); line-height: 1.7; padding-top: 16px; border-top: 1px solid var(--border); }

  /* CAMARIM CTA */
  .camarim-cta { margin-top: 28px; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: 24px; text-align: center; }
  .camarim-cta .cta-icon { font-size: 32px; margin-bottom: 10px; }
  .camarim-cta h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cream); margin-bottom: 8px; }
  .camarim-cta p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }
  .btn-camarim-modal { display: inline-block; background: var(--gold); color: var(--dark); text-decoration: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 13px 28px; border-radius: 4px; transition: background .2s; }
  .btn-camarim-modal:hover { background: var(--gold-lt); }
  .camarim-unavailable { margin-top: 28px; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: 20px 24px; font-size: 13px; color: var(--muted); text-align: center; }

  footer { border-top: 1px solid var(--border); padding: 32px 24px; text-align: center; font-size: 12px; color: var(--muted); letter-spacing: .06em; }
  footer strong { color: var(--gold); }

  @media (max-width: 640px) {
    .event-card { grid-template-columns: 72px 1fr; }
    .event-card::after { display: none; }
    .card-action { display: none; }
    .card-info { padding: 14px 16px; }
    .card-venue { font-size: 16px; }
    .card-date { min-width: 72px; padding: 16px 10px; }
    .card-date .day { font-size: 26px; }
    .modal-details { grid-template-columns: 1fr; }
    .separator { display: none; }
    .cal-cell { min-height: 58px; }
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-photo"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Agenda Oficial</p>
    <h1>Ramon <span>&</span><br>Rafael</h1>
    <p class="hero-sub">Shows · Eventos · Visita ao Camarim</p>
    <div class="gold-line"></div>
  </div>
</header>

<div class="controls-bar" id="controls-bar" style="display:none">
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter(this,'todos')">Todos</button>
    <button class="filter-btn" onclick="setFilter(this,'proximo')">Próximos</button>
    <button class="filter-btn" onclick="setFilter(this,'passado')">Realizados</button>
  </div>
  <div class="separator"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-list" onclick="setView('list')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
      Lista
    </button>
    <button class="view-btn" id="btn-cal" onclick="setView('cal')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="2" width="14" height="13" rx="1.5"/><line x1="1" y1="6" x2="15" y2="6"/><line x1="5" y1="1" x2="5" y2="3"/><line x1="11" y1="1" x2="11" y2="3"/></svg>
      Calendário
    </button>
  </div>
</div>

<section class="events-section">
  <div id="loading-state" class="loading-bar">
    <div class="spinner"></div>
    <p>Carregando agenda...</p>
  </div>

  <div id="main-content" style="display:none">
    <div class="section-header">
      <p class="events-label" id="events-label">Todos os shows</p>
    </div>
    <div class="events-grid" id="events-grid"></div>
    <div class="calendar-wrap" id="calendar-wrap" style="display:none">
      <div class="cal-nav">
        <button onclick="calPrev()">&#8249;</button>
        <p class="cal-month-title" id="cal-title"></p>
        <button onclick="calNext()">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>
</section>

<footer>
  <p>© 2025 <strong>Ramon & Rafael</strong> · Assessoria GBA Music · Todos os direitos reservados</p>
</footer>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <p class="m-eyebrow" id="m-eyebrow"></p>
      <h2 id="m-venue"></h2>
      <p class="m-date" id="m-date-city"></p>
    </div>
    <div class="modal-body">
      <div class="modal-details">
        <div class="detail-item"><label>Data</label><p id="m-data"></p></div>
        <div class="detail-item"><label>Horário</label><p id="m-hora"></p></div>
        <div class="detail-item"><label>Cidade / Estado</label><p id="m-cidade"></p></div>
        <div class="detail-item"><label>Tipo de evento</label><p id="m-tipo"></p></div>
        <div class="detail-item" style="grid-column:1/-1"><label>Endereço</label><p id="m-endereco"></p></div>
      </div>
      <p class="modal-desc" id="m-desc"></p>
      <div id="m-camarim-block"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIGURAÇÃO — troque pela sua Sheet ID
// ─────────────────────────────────────────────
const SHEET_ID  = '1tu3GbOEqDK_gNg4gnQ3IAnMbkmvXLEGb2hFkUNP97Kw';
const SHEET_TAB = 'Shows'; // nome da aba
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

// ─────────────────────────────────────────────
//  DADOS DE EXEMPLO (usados enquanto SHEET_ID
//  não estiver configurado)
// ─────────────────────────────────────────────
const DEMO_EVENTS = [
  { id:'1', dia:'28', mes:'Jun', dia_semana:'Sáb', ano:'2025', mes_num:'6', local:'Expô Agro Franca',              cidade:'Franca',                estado:'SP', horario:'22h00', tipo:'Rodeio / Exposição',   endereco:'Parque de Exposições Pedro Ciarlini — Franca/SP',           status:'aberto',   descricao:'Ramon e Rafael sobem ao palco principal da Expô Agro Franca em uma noite especial de sertanejo raiz e universitário.',              form_camarim:'https://forms.gle/EXEMPLO1' },
  { id:'2', dia:'05', mes:'Jul', dia_semana:'Sáb', ano:'2025', mes_num:'7', local:'Fest Vaquejada Rio Preto',      cidade:'São José do Rio Preto', estado:'SP', horario:'21h00', tipo:'Vaquejada',             endereco:'Arena Vaquejada — Rod. Washington Luís, km 442',            status:'aberto',   descricao:'Uma das maiores vaquejadas do interior paulista recebe Ramon e Rafael para uma noite inesquecível.',                                  form_camarim:'https://forms.gle/EXEMPLO2' },
  { id:'3', dia:'19', mes:'Jul', dia_semana:'Sáb', ano:'2025', mes_num:'7', local:'Prefeitura Municipal — Festa do Peão', cidade:'Lins',           estado:'SP', horario:'20h30', tipo:'Festa Municipal',       endereco:'Parque Municipal de Lins — Praça dos Ipês, s/n',            status:'aberto',   descricao:'Show contratado pela Prefeitura de Lins como atração principal da Festa do Peão 2025.',                                              form_camarim:'' },
  { id:'4', dia:'02', mes:'Ago', dia_semana:'Sáb', ano:'2025', mes_num:'8', local:'Clube Náutico Bauru',           cidade:'Bauru',                estado:'SP', horario:'22h00', tipo:'Show em Casa de Show',  endereco:'Clube Náutico de Bauru — Av. Nações Unidas, 14-85',         status:'esgotado', descricao:'Ingressos esgotados! Para lista de espera, entre em contato com a assessoria.',                                                    form_camarim:'https://forms.gle/EXEMPLO4' },
  { id:'5', dia:'14', mes:'Jun', dia_semana:'Sáb', ano:'2025', mes_num:'6', local:'Arena Sertanejo Campinas',      cidade:'Campinas',             estado:'SP', horario:'21h00', tipo:'Festival',              endereco:'Pavilhão Expo D — Rodovia Santos Dumont, km 66',            status:'passado',  descricao:'Show realizado com casa lotada. Mais de 4 mil pessoas acompanharam a dupla nessa noite histórica em Campinas.',                     form_camarim:'' },
  { id:'6', dia:'31', mes:'Mai', dia_semana:'Sáb', ano:'2025', mes_num:'5', local:'Rodeio Internacional de Barretos', cidade:'Barretos',          estado:'SP', horario:'23h00', tipo:'Rodeio',               endereco:'Parque do Peão — Barretos/SP',                              status:'passado',  descricao:'Participação especial no palco secundário do Rodeio de Barretos. Um marco na carreira da dupla.',                                   form_camarim:'' },
];

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOWS      = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let ALL_EVENTS     = [];
let currentFilter  = 'todos';
let currentView    = 'list';
let calYear        = new Date().getFullYear();
let calMonth       = new Date().getMonth();

// ─── CSV PARSER ───────────────────────────────
function parseCSV(text) {
  // Tokeniza respeitando campos entre aspas (incluindo quebras de linha dentro deles)
  function tokenize(str) {
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (ch === '"') {
        if (inQ && str[i+1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else if ((ch === '\n' || (ch === '\r' && str[i+1] === '\n')) && !inQ) {
        if (ch === '\r') i++;
        row.push(cur.trim()); rows.push(row); row = []; cur = '';
      } else {
        cur += ch;
      }
    }
    row.push(cur.trim()); rows.push(row);
    return rows;
  }

  const rows = tokenize(text);

  // Mapeamento fixo: posição da coluna → chave JS
  // Baseado na estrutura da planilha (linha 3 = cabeçalhos, cols A-O)
  const COL_MAP = {
    0:  'id',
    1:  'dia',
    2:  'mes',
    3:  'dia_semana',
    4:  'ano',
    5:  'mes_num',
    6:  'local',
    7:  'cidade',
    8:  'estado',
    9:  'horario',
    10: 'tipo',
    11: 'endereco',
    12: 'status',
    13: 'descricao',
    14: 'form_camarim',
  };

  const VALID_STATUS = ['aberto', 'esgotado', 'passado'];

  return rows
    .map(cols => {
      const obj = {};
      Object.entries(COL_MAP).forEach(([i, key]) => {
        obj[key] = (cols[i] || '').replace(/\n/g, ' ').trim();
      });
      return obj;
    })
    // só linhas que têm id numérico E status válido (ignora título, cabeçalho, legenda)
    .filter(r => /^\d+$/.test(r.id) && VALID_STATUS.includes(r.status));
}

// ─── LOAD ─────────────────────────────────────
async function loadEvents() {
  if (SHEET_ID === 'SEU_GOOGLE_SHEET_ID_AQUI') {
    ALL_EVENTS = DEMO_EVENTS;
    boot();
    return;
  }
  try {
    const res  = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    ALL_EVENTS = parseCSV(text);
    boot();
  } catch(e) {
    document.getElementById('loading-state').innerHTML = `
      <div class="error-box">
        <p>⚠️ Não foi possível carregar a agenda.</p>
        <p style="margin-top:8px;font-size:13px">Verifique se o SHEET_ID está correto e se a planilha está publicada.</p>
        <code>${e.message}</code>
      </div>`;
  }
}

function boot() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('main-content').style.display  = 'block';
  document.getElementById('controls-bar').style.display  = 'flex';

  // set calendar to month of first upcoming event or today
  const upcoming = ALL_EVENTS.find(e => e.status !== 'passado');
  if (upcoming) { calMonth = parseInt(upcoming.mes_num) - 1; calYear = parseInt(upcoming.ano) || calYear; }

  renderList(getFiltered());
}

// ─── FILTER / VIEW ────────────────────────────
function getFiltered() {
  if (currentFilter === 'proximo') return ALL_EVENTS.filter(e => e.status !== 'passado');
  if (currentFilter === 'passado') return ALL_EVENTS.filter(e => e.status === 'passado');
  return ALL_EVENTS;
}

function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { todos:'Todos os shows', proximo:'Próximos shows', passado:'Shows realizados' };
  document.getElementById('events-label').textContent = labels[type];
  currentView === 'list' ? renderList(getFiltered()) : renderCalendar();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-cal').classList.toggle('active',  v === 'cal');
  document.getElementById('events-grid').style.display   = v === 'list' ? 'flex'  : 'none';
  document.getElementById('calendar-wrap').style.display = v === 'cal'  ? 'block' : 'none';
  v === 'list' ? renderList(getFiltered()) : renderCalendar();
}

// ─── LIST ─────────────────────────────────────
function renderList(evs) {
  const grid = document.getElementById('events-grid');
  grid.innerHTML = '';
  if (!evs.length) { grid.innerHTML = '<p class="empty">Nenhum show encontrado.</p>'; return; }
  evs.forEach(ev => {
    const isPast = ev.status === 'passado';
    const card   = document.createElement('div');
    card.className = 'event-card' + (isPast ? ' past' : '');
    const hasForm = ev.form_camarim && ev.form_camarim.startsWith('http');
    card.innerHTML = `
      <div class="card-date">
        <span class="day">${ev.dia}</span>
        <span class="month">${ev.mes}</span>
        <span class="weekday">${ev.dia_semana}</span>
      </div>
      <div class="card-info">
        <p class="card-city">${ev.cidade} — ${ev.estado}</p>
        <p class="card-venue">${ev.local}</p>
        <div class="card-meta">
          <span>🕘 ${ev.horario}</span>
          <span>🎪 ${ev.tipo}</span>
        </div>
      </div>
      <div class="card-action">
        <span class="badge-status ${ev.status}">${ev.status==='aberto'?'Confirmado':ev.status==='esgotado'?'Esgotado':'Realizado'}</span>
        ${!isPast && hasForm
          ? `<button class="btn-camarim" onclick="openCamarimDirect(event,'${ev.form_camarim}')">🎤 Camarim</button>`
          : !isPast ? `<button class="btn-camarim" disabled>🎤 Camarim</button>` : ''}
      </div>`;
    card.addEventListener('click', () => openModal(ev));
    grid.appendChild(card);
  });
}

// ─── CALENDAR ─────────────────────────────────
function renderCalendar() {
  document.getElementById('cal-title').innerHTML = `${MONTHS_PT[calMonth]} <span>${calYear}</span>`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DOWS.forEach(d => { const h = document.createElement('div'); h.className='cal-dow'; h.textContent=d; grid.appendChild(h); });

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();
  const today       = new Date();
  const filtered    = getFiltered();

  const evMap = {};
  filtered.forEach(ev => {
    if (parseInt(ev.mes_num)-1 === calMonth && parseInt(ev.ano) === calYear) {
      const d = parseInt(ev.dia);
      if (!evMap[d]) evMap[d] = [];
      evMap[d].push(ev);
    }
  });

  const total = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    let cellDay, other = false;
    if (i < firstDay)                    { cellDay = daysInPrev - firstDay + 1 + i; other = true; }
    else if (i >= firstDay + daysInMonth){ cellDay = i - firstDay - daysInMonth + 1; other = true; }
    else                                 { cellDay = i - firstDay + 1; }
    if (other) cell.classList.add('other-month');
    if (!other && cellDay===today.getDate() && calMonth===today.getMonth() && calYear===today.getFullYear()) cell.classList.add('today');
    const num = document.createElement('div'); num.className='cal-cell-num'; num.textContent=cellDay; cell.appendChild(num);
    if (!other && evMap[cellDay]) {
      evMap[cellDay].forEach(ev => {
        const pill = document.createElement('div');
        pill.className = 'cal-event ' + ev.status;
        pill.textContent = ev.local; pill.title = ev.local;
        pill.addEventListener('click', e => { e.stopPropagation(); openModal(ev); });
        cell.appendChild(pill);
      });
    }
    grid.appendChild(cell);
  }
}

function calPrev() { calMonth--; if (calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if (calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

// ─── MODAL ────────────────────────────────────
function openModal(ev) {
  const mesIdx = parseInt(ev.mes_num) - 1;
  const mesNome = MONTHS_PT[mesIdx] || ev.mes;
  const mesStr  = String(ev.mes_num).padStart(2,'0');

  document.getElementById('m-eyebrow').textContent   = ev.tipo;
  document.getElementById('m-venue').textContent     = ev.local;
  document.getElementById('m-date-city').textContent = `${ev.dia_semana}, ${ev.dia} de ${mesNome} · ${ev.cidade}/${ev.estado}`;
  document.getElementById('m-data').textContent      = `${ev.dia}/${mesStr}/${ev.ano}`;
  document.getElementById('m-hora').textContent      = ev.horario;
  document.getElementById('m-cidade').textContent    = `${ev.cidade} / ${ev.estado}`;
  document.getElementById('m-tipo').textContent      = ev.tipo;
  document.getElementById('m-endereco').textContent  = ev.endereco;
  document.getElementById('m-desc').textContent      = ev.descricao;

  const block = document.getElementById('m-camarim-block');
  const hasForm = ev.form_camarim && ev.form_camarim.startsWith('http');

  if (ev.status === 'passado') {
    block.innerHTML = `<div class="camarim-unavailable">Este show já foi realizado.</div>`;
  } else if (hasForm) {
    block.innerHTML = `
      <div class="camarim-cta">
        <div class="cta-icon">🎤</div>
        <h3>Quer visitar o camarim?</h3>
        <p>Preencha o formulário e nossa equipe entrará em contato pelo WhatsApp para confirmar sua visita.</p>
        <a class="btn-camarim-modal" href="${ev.form_camarim}" target="_blank" rel="noopener">Solicitar visita ao camarim</a>
      </div>`;
  } else {
    block.innerHTML = `<div class="camarim-unavailable">Formulário de camarim ainda não disponível para este show.</div>`;
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openCamarimDirect(e, url) {
  e.stopPropagation();
  window.open(url, '_blank', 'noopener');
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalDirect(); });

// INIT
loadEvents();
</script>
</body>
