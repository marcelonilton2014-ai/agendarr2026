<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Ramon & Rafael</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #F0EFED;
  --card:    #E8E7E4;
  --card2:   #DDDCDA;
  --border:  #D0CFCD;
  --border2: #C4C3C0;
  --white:   #111111;
  --off:     #555555;
  --muted:   #999999;
  --accent:  #8A6A3A;
  --accent2: #A07840;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ─────────────────────────────────── */
.hero {
  position: relative;
  width: 100%;
  overflow: hidden;
  text-align: center;
}
.hero-photo-wrap {
  position: relative;
  width: 480px;
  max-width: 100%;
  margin: 0 auto;
  display: block;
}
.hero-photo {
  width: 100%;
  display: block;
  object-fit: cover;
  object-position: center top;
}
/* degrade inferior — funde com o fundo cinza */
.hero-photo-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(240,239,237,.6) 55%,
    var(--bg) 100%
  );
  pointer-events: none;
}
.hero-photo-fade-sides { display: none; }
.hero-overlay {
  position: relative;
  z-index: 2;
  padding: 0 48px 48px;
  margin-top: -28px;
}
.hero-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 32px 48px;
  z-index: 3;
}
.hero-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--muted);
}
.hero-year {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--muted);
}
.hero-names {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(64px, 12vw, 140px);
  line-height: .88;
  letter-spacing: .02em;
  color: var(--white);
}
.hero-names .and {
  color: var(--accent);
  font-size: .65em;
  display: inline-block;
  margin: 0 6px;
}
.hero-bottom {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 14px;
}
.hero-sub {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
}
.hero-line {
  width: 32px;
  height: 1px;
  background: var(--border2);
}
.hero-agenda-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--accent);
  white-space: nowrap;
}

/* ── CONTROLS ────────────────────────────── */
.controls-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.filter-group { display: flex; gap: 4px; }
.filter-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: 2px;
  cursor: pointer;
  transition: color .2s, background .2s;
}
.filter-btn:hover { color: var(--off); }
.filter-btn.active { background: var(--card2); color: var(--white); }

.view-toggle {
  display: flex;
  gap: 2px;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  padding: 2px;
}
.view-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 6px 14px;
  cursor: pointer;
  border-radius: 2px;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.view-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.view-btn:hover { color: var(--white); }
.view-btn.active { background: var(--white); color: var(--bg); }

/* ── EVENTS SECTION ──────────────────────── */
.events-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 48px 80px;
}
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}

/* ── LIST VIEW ───────────────────────────── */
.events-grid {
  display: flex;
  flex-direction: column;
}

.event-card {
  display: grid;
  grid-template-columns: 100px 1fr auto;
  align-items: center;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  padding: 0;
}
.event-card:hover { background: var(--card); }
.event-card.past { opacity: .35; }
.event-card.past:hover { opacity: .5; }

.card-date {
  padding: 24px 20px;
  border-right: 1px solid var(--border);
  text-align: center;
  align-self: stretch;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card-date .day {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  line-height: 1;
  color: var(--white);
  letter-spacing: .02em;
}
.card-date .month {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}
.card-date .weekday {
  font-size: 9px;
  color: var(--muted);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: .08em;
}
.event-card.past .card-date .day { color: var(--muted); }

.card-info {
  padding: 24px 32px;
}
.card-city {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.card-venue {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: .03em;
  color: var(--white);
  line-height: 1;
}
.card-meta {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  letter-spacing: .04em;
}

.card-action {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}
.badge-status {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 2px;
  white-space: nowrap;
}
.badge-status.aberto   { color: var(--accent); border: 1px solid rgba(200,169,110,.3); background: rgba(200,169,110,.06); }
.badge-status.esgotado { color: var(--muted);  border: 1px solid var(--border); }
.badge-status.passado  { color: var(--muted);  border: 1px solid var(--border); }

.btn-camarim {
  background: var(--white);
  color: var(--bg);
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: 2px;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.btn-camarim:hover { background: var(--off); }
.btn-camarim:disabled { opacity: .3; cursor: default; }

/* ── LOADING / ERROR ─────────────────────── */
.loading-bar { text-align: center; padding: 100px 24px; color: var(--muted); }
.loading-bar .spinner {
  width: 28px; height: 28px;
  border: 1px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { text-align: center; padding: 60px 24px; color: var(--muted); }
.error-box code { font-size: 11px; background: var(--card); padding: 4px 10px; border-radius: 2px; color: var(--accent); display: inline-block; margin-top: 12px; }
.empty { padding: 80px 24px; text-align: center; color: var(--muted); font-size: 13px; letter-spacing: .06em; }

/* ── CALENDAR VIEW ───────────────────────── */
.calendar-wrap { }
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-top: 8px;
}
.cal-nav button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--off);
  font-size: 16px;
  width: 34px; height: 34px;
  border-radius: 2px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.cal-nav button:hover { border-color: var(--white); color: var(--white); }
.cal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: .12em;
  color: var(--white);
}
.cal-title span { color: var(--accent); margin-left: 6px; }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
.cal-dow {
  background: var(--bg);
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 0;
}
.cal-cell {
  background: var(--card);
  min-height: 86px;
  padding: 8px;
  position: relative;
}
.cal-cell.other-month { background: var(--bg); opacity: .4; }
.cal-cell.today { outline: 1px solid var(--accent); outline-offset: -1px; }
.cal-cell-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: .04em;
}
.cal-cell.today .cal-cell-num { color: var(--accent); }

.cal-event {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .02em;
  padding: 3px 7px;
  margin-bottom: 2px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-radius: 1px;
  transition: opacity .15s;
}
.cal-event:hover { opacity: .75; }
.cal-event.aberto   { background: var(--white); color: var(--bg); }
.cal-event.esgotado { background: var(--card2); color: var(--muted); border: 1px solid var(--border2); }
.cal-event.passado  { background: transparent; color: var(--muted); border: 1px solid var(--border); }

/* ── MODAL ───────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: #FFFFFF;
  border: 1px solid var(--border2);
  border-radius: 2px;
  width: 100%; max-width: 540px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(16px);
  transition: transform .2s;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.modal-backdrop.open .modal { transform: translateY(0); }

.modal-header {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.modal-close {
  position: absolute; top: 20px; right: 20px;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--off); font-size: 14px;
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, color .15s;
}
.modal-close:hover { border-color: var(--white); color: var(--white); }
.m-eyebrow {
  font-size: 9px; font-weight: 700;
  letter-spacing: .25em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.modal-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px; letter-spacing: .04em;
  color: var(--white); line-height: 1;
}
.m-date {
  font-size: 12px; color: var(--muted);
  margin-top: 8px; letter-spacing: .04em;
}

.modal-body { padding: 28px 32px; }
.modal-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.detail-item label {
  display: block;
  font-size: 9px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.detail-item p { font-size: 13px; color: var(--white); line-height: 1.4; }

.modal-desc {
  font-size: 13px; color: var(--muted);
  line-height: 1.75;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.modal-desc a { color: var(--accent); text-decoration: underline; word-break: break-all; }

/* camarim block */
.camarim-cta {
  margin-top: 24px;
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 24px;
  text-align: center;
}
.camarim-cta h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: .06em; color: var(--white); margin-bottom: 6px; }
.camarim-cta p { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }
.btn-camarim-modal {
  display: inline-block;
  background: var(--white); color: var(--bg);
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 12px 24px; border-radius: 2px;
  transition: background .15s;
}
.btn-camarim-modal:hover { background: var(--off); }
.camarim-unavailable {
  margin-top: 20px;
  font-size: 11px; color: var(--muted);
  text-align: center; padding: 16px;
  border: 1px solid var(--border); border-radius: 2px;
  letter-spacing: .06em;
}

/* ── FOOTER ──────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 64px 48px 40px;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  text-align: center;
}
.footer-cta-label {
  font-size: 13px; color: var(--muted);
  letter-spacing: .06em; margin-bottom: 4px;
}
.btn-whatsapp {
  display: inline-flex; align-items: center; gap: 10px;
  background: #25D366; color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  text-decoration: none;
  padding: 14px 32px; border-radius: 2px;
  transition: background .15s, transform .15s;
  box-shadow: 0 4px 32px rgba(37,211,102,.25);
}
.btn-whatsapp:hover { background: #1ebe5d; transform: translateY(-1px); }
.footer-copy {
  font-size: 10px; color: var(--muted);
  letter-spacing: .12em; text-transform: uppercase;
}
.footer-copy strong { color: var(--accent); font-weight: 600; }

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width: 768px) {
  .hero-top { padding: 20px 24px; }
  .hero-overlay { padding: 0 24px 24px; }
  .hero-names { font-size: clamp(54px, 16vw, 90px); }
  .controls-wrap { padding: 20px 24px; }
  .events-section { padding: 0 24px 60px; }
  .event-card { grid-template-columns: 72px 1fr; }
  .card-action { display: none; }
  .card-date { padding: 16px 12px; }
  .card-date .day { font-size: 34px; }
  .card-info { padding: 16px 18px; }
  .card-venue { font-size: 20px; }
  .modal-details { grid-template-columns: 1fr; gap: 14px; }
  .modal-header { padding: 24px 24px 20px; }
  .modal-body { padding: 20px 24px; }
  footer { padding: 48px 24px 32px; }
  .cal-cell { min-height: 60px; }
  .hero-top { flex-direction: column; gap: 4px; }
  .hero-bottom { flex-direction: column; align-items: flex-start; gap: 8px; }
  .hero-line { display: none; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
</style>
</head>

<script>
const SHEET_ID  = '1tu3GbOEqDK_gNg4gnQ3IAnMbkmvXLEGb2hFkUNP97Kw';
const SHEET_TAB = 'Shows';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOWS      = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let ALL_EVENTS    = [];
let currentFilter = 'todos';
let currentView   = 'list';
let calYear       = new Date().getFullYear();
let calMonth      = new Date().getMonth();

// ── CSV PARSER ────────────────────────────────
function parseCSV(text) {
  function tokenize(str) {
    const rows = []; let row = [], cur = '', inQ = false;
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (ch === '"') { if (inQ && str[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
      else if (ch===',' && !inQ) { row.push(cur.trim()); cur=''; }
      else if ((ch==='\n'||(ch==='\r'&&str[i+1]==='\n')) && !inQ) { if(ch==='\r')i++; row.push(cur.trim()); rows.push(row); row=[]; cur=''; }
      else cur+=ch;
    }
    row.push(cur.trim()); rows.push(row); return rows;
  }
  const COL_MAP = { 0:'id',1:'dia',2:'mes',3:'dia_semana',4:'ano',5:'mes_num',6:'local',7:'cidade',8:'estado',9:'horario',10:'tipo',11:'endereco',12:'status',13:'descricao',14:'form_camarim' };
  const VALID = ['aberto','esgotado','passado'];
  return tokenize(text)
    .map(cols => { const o={}; Object.entries(COL_MAP).forEach(([i,k])=>o[k]=(cols[i]||'').replace(/\n/g,' ').trim()); return o; })
    .map(r => { if(r.status!=='passado'){const d=new Date(parseInt(r.ano),parseInt(r.mes_num)-1,parseInt(r.dia)+1);if(d<new Date())r.status='passado';} return r; })
    .filter(r => /^\d+$/.test(r.id) && VALID.includes(r.status));
}

// ── LOAD ──────────────────────────────────────
async function loadEvents() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    ALL_EVENTS = parseCSV(await res.text());
    boot();
  } catch(e) {
    document.getElementById('loading-state').innerHTML = `<div class="error-box"><p>⚠️ Não foi possível carregar a agenda.</p><code>${e.message}</code></div>`;
  }
}

function boot() {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('main-content').style.display  = 'block';
  document.getElementById('controls-bar').style.display  = 'flex';
  const up = ALL_EVENTS.find(e=>e.status!=='passado');
  if (up) { calMonth=parseInt(up.mes_num)-1; calYear=parseInt(up.ano)||calYear; }
  renderList(getFiltered());
}

function getFiltered() {
  if (currentFilter==='proximo') return ALL_EVENTS.filter(e=>e.status!=='passado');
  if (currentFilter==='passado') return ALL_EVENTS.filter(e=>e.status==='passado');
  return ALL_EVENTS;
}

function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('events-label').textContent = {todos:'Todos os shows',proximo:'Próximos shows',passado:'Shows realizados'}[type];
  currentView==='list' ? renderList(getFiltered()) : renderCalendar();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('btn-cal').classList.toggle('active',  v==='cal');
  document.getElementById('events-grid').style.display   = v==='list' ? 'flex'  : 'none';
  document.getElementById('calendar-wrap').style.display = v==='cal'  ? 'block' : 'none';
  v==='list' ? renderList(getFiltered()) : renderCalendar();
}

// ── LIST ──────────────────────────────────────
function renderList(evs) {
  const grid = document.getElementById('events-grid');
  grid.innerHTML = '';
  if (!evs.length) { grid.innerHTML='<p class="empty">Nenhum show encontrado.</p>'; return; }
  evs.forEach(ev => {
    const isPast = ev.status==='passado';
    const hasForm = ev.form_camarim && ev.form_camarim.startsWith('http');
    const card = document.createElement('div');
    card.className = 'event-card'+(isPast?' past':'');
    card.innerHTML = `
      <div class="card-date">
        <span class="day">${ev.dia}</span>
        <span class="month">${ev.mes}</span>
        <span class="weekday">${ev.dia_semana}</span>
      </div>
      <div class="card-info">
        <p class="card-city">${ev.cidade} — ${ev.estado}</p>
        <p class="card-venue">${ev.local}</p>
        <div class="card-meta">
          <span>${ev.horario}</span>
          <span>${ev.tipo}</span>
        </div>
      </div>
      <div class="card-action">
        <span class="badge-status ${ev.status}">${ev.status==='aberto'?'Confirmado':ev.status==='esgotado'?'Esgotado':'Realizado'}</span>
        ${!isPast && hasForm ? `<button class="btn-camarim" onclick="openCamarimDirect(event,'${ev.form_camarim}')">Camarim</button>` : !isPast ? `<button class="btn-camarim" disabled>Camarim</button>` : ''}
      </div>`;
    card.addEventListener('click', () => openModal(ev));
    grid.appendChild(card);
  });
}

// ── CALENDAR ──────────────────────────────────
function renderCalendar() {
  document.getElementById('cal-title').innerHTML = `${MONTHS_PT[calMonth]}<span>${calYear}</span>`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DOWS.forEach(d => { const h=document.createElement('div'); h.className='cal-dow'; h.textContent=d; grid.appendChild(h); });
  const firstDay=new Date(calYear,calMonth,1).getDay(), daysInMonth=new Date(calYear,calMonth+1,0).getDate(), daysInPrev=new Date(calYear,calMonth,0).getDate(), today=new Date();
  const evMap={};
  getFiltered().forEach(ev=>{
    if(parseInt(ev.mes_num)-1===calMonth&&parseInt(ev.ano)===calYear){const d=parseInt(ev.dia);if(!evMap[d])evMap[d]=[];evMap[d].push(ev);}
  });
  const total=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<total;i++){
    const cell=document.createElement('div'); cell.className='cal-cell';
    let cellDay,other=false;
    if(i<firstDay){cellDay=daysInPrev-firstDay+1+i;other=true;}
    else if(i>=firstDay+daysInMonth){cellDay=i-firstDay-daysInMonth+1;other=true;}
    else{cellDay=i-firstDay+1;}
    if(other)cell.classList.add('other-month');
    if(!other&&cellDay===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear())cell.classList.add('today');
    const num=document.createElement('div'); num.className='cal-cell-num'; num.textContent=cellDay; cell.appendChild(num);
    if(!other&&evMap[cellDay])evMap[cellDay].forEach(ev=>{
      const pill=document.createElement('div'); pill.className='cal-event '+ev.status; pill.textContent=ev.local; pill.title=ev.local;
      pill.addEventListener('click',e=>{e.stopPropagation();openModal(ev);}); cell.appendChild(pill);
    });
    grid.appendChild(cell);
  }
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

// ── MODAL ─────────────────────────────────────
function linkify(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function openModal(ev) {
  const mesNome = MONTHS_PT[parseInt(ev.mes_num)-1]||ev.mes;
  const mesStr  = String(ev.mes_num).padStart(2,'0');
  document.getElementById('m-eyebrow').textContent   = ev.tipo;
  document.getElementById('m-venue').textContent     = ev.local;
  document.getElementById('m-date-city').textContent = `${ev.dia_semana}, ${ev.dia} de ${mesNome} · ${ev.cidade}/${ev.estado}`;
  document.getElementById('m-data').textContent      = `${ev.dia}/${mesStr}/${ev.ano}`;
  document.getElementById('m-hora').textContent      = ev.horario;
  document.getElementById('m-cidade').textContent    = `${ev.cidade} / ${ev.estado}`;
  document.getElementById('m-tipo').textContent      = ev.tipo;
  document.getElementById('m-endereco').textContent  = ev.endereco;
  document.getElementById('m-desc').innerHTML        = linkify(ev.descricao);
  const block = document.getElementById('m-camarim-block');
  const hasForm = ev.form_camarim && ev.form_camarim.startsWith('http');
  if (ev.status==='passado') {
    block.innerHTML = `<div class="camarim-unavailable">Este show já foi realizado.</div>`;
  } else if (hasForm) {
    block.innerHTML = `<div class="camarim-cta"><h3>Visitar o Camarim</h3><p>Preencha o formulário e nossa equipe entrará em contato pelo WhatsApp para confirmar sua visita.</p><a class="btn-camarim-modal" href="${ev.form_camarim}" target="_blank" rel="noopener">Solicitar visita ao camarim</a></div>`;
  } else {
    block.innerHTML = `<div class="camarim-unavailable">Formulário de camarim ainda não disponível para este show.</div>`;
  }
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openCamarimDirect(e, url) { e.stopPropagation(); window.open(url,'_blank','noopener'); }
function closeModal(e) { if(e.target===document.getElementById('modal'))closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape')closeModalDirect(); });

loadEvents();
</script>
